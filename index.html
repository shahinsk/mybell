<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🔔 Bell Trigger</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:system-ui,sans-serif;
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;color:#fff;padding:20px;
  }
  h1{font-size:2rem;margin-bottom:4px;text-align:center}
  .sub{color:#a0aec0;font-size:0.9rem;margin-bottom:32px;text-align:center}

  .card{
    background:rgba(255,255,255,0.07);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:24px;padding:32px 24px;
    width:100%;max-width:380px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* JOIN SCREEN */
  #joinScreen{display:flex;flex-direction:column;gap:14px;align-items:center}
  #joinScreen h2{font-size:1.05rem;color:#63b3ed;text-align:center;line-height:1.6}
  .saved-pill{
    display:flex;align-items:center;gap:10px;
    background:rgba(104,211,145,0.1);border:1px solid rgba(104,211,145,0.25);
    border-radius:12px;padding:10px 14px;width:100%;
  }
  .saved-pill span{flex:1;font-size:0.82rem;color:#68d391}
  .saved-pill strong{letter-spacing:3px;font-size:1rem}
  .clear-btn{
    background:rgba(252,129,129,0.15);border:1px solid rgba(252,129,129,0.3);
    color:#fc8181;border-radius:8px;padding:5px 10px;
    font-size:0.75rem;cursor:pointer;white-space:nowrap;
  }
  #roomInput{
    width:100%;background:rgba(0,0,0,0.35);
    border:2px solid rgba(255,255,255,0.15);border-radius:14px;
    padding:16px;color:#fff;font-size:1.5rem;
    letter-spacing:6px;text-align:center;outline:none;
    transition:border-color 0.2s;
  }
  #roomInput:focus{border-color:#63b3ed}
  #roomInput::placeholder{letter-spacing:2px;font-size:0.9rem;color:#4a5568}
  .join-btn{
    width:100%;padding:16px;border-radius:14px;border:none;
    background:linear-gradient(135deg,#3182ce,#2b6cb0);
    color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;
    transition:transform 0.1s,opacity 0.2s;
  }
  .join-btn:active{transform:scale(0.97)}
  .join-btn:disabled{opacity:0.4;cursor:not-allowed}

  /* MAIN SCREEN */
  #mainScreen{display:none;flex-direction:column;gap:20px}
  .room-label{
    text-align:center;padding:10px 16px;
    background:rgba(0,0,0,0.25);border-radius:12px;
    font-size:0.85rem;color:#a0aec0;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .room-label strong{color:#68d391;letter-spacing:3px;font-size:1rem}
  .change-room-btn{
    background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
    color:#a0aec0;border-radius:8px;padding:4px 10px;
    font-size:0.72rem;cursor:pointer;white-space:nowrap;
  }
  .change-room-btn:hover{background:rgba(255,255,255,0.12);color:#fff}

  /* Role badge */
  .role-badge{
    text-align:center;font-size:0.75rem;padding:5px 12px;
    border-radius:20px;display:inline-flex;align-items:center;
    gap:6px;margin:0 auto;
  }
  .role-badge.host{background:rgba(159,122,234,0.15);color:#b794f4;border:1px solid rgba(159,122,234,0.25)}
  .role-badge.guest{background:rgba(99,179,237,0.15);color:#63b3ed;border:1px solid rgba(99,179,237,0.25)}

  .status-badge{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding:10px 14px;border-radius:20px;font-size:0.85rem;font-weight:500;
    transition:all 0.3s;text-align:center;
  }
  .status-badge.waiting{background:rgba(237,137,54,0.12);color:#f6ad55;border:1px solid rgba(237,137,54,0.25)}
  .status-badge.connected{background:rgba(104,211,145,0.12);color:#68d391;border:1px solid rgba(104,211,145,0.25)}
  .status-badge.reconnecting{background:rgba(99,179,237,0.1);color:#63b3ed;border:1px solid rgba(99,179,237,0.2)}
  .status-badge.disconnected{background:rgba(229,62,62,0.1);color:#fc8181;border:1px solid rgba(229,62,62,0.2)}
  .dot{width:9px;height:9px;border-radius:50%;background:currentColor;flex-shrink:0}
  .dot.pulse{animation:pulse 1.4s infinite}
  .dot.spin{animation:spin 1s linear infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  /* Bell */
  .bell-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  .bell-btn{
    width:160px;height:160px;border-radius:50%;border:none;cursor:pointer;
    background:radial-gradient(circle at 35% 35%,#f6ad55,#dd6b20);
    box-shadow:0 0 0 0 rgba(246,173,85,0.5),0 12px 40px rgba(0,0,0,0.4);
    font-size:4rem;transition:transform 0.12s;
    display:flex;align-items:center;justify-content:center;
  }
  .bell-btn:not(:disabled):active{transform:scale(0.92)}
  .bell-btn:disabled{filter:grayscale(0.6);cursor:not-allowed;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
  .bell-btn.pulse-ring{animation:ring 0.55s ease-in-out,ripple 0.55s ease-out}
  @keyframes ring{
    0%{transform:rotate(0) scale(1)}
    15%{transform:rotate(-18deg) scale(1.08)}
    30%{transform:rotate(18deg) scale(1.08)}
    45%{transform:rotate(-12deg)}60%{transform:rotate(12deg)}
    75%{transform:rotate(-6deg)}90%{transform:rotate(6deg)}
    100%{transform:rotate(0) scale(1)}
  }
  @keyframes ripple{
    0%{box-shadow:0 0 0 0 rgba(246,173,85,0.6),0 12px 40px rgba(0,0,0,0.4)}
    100%{box-shadow:0 0 0 70px rgba(246,173,85,0),0 12px 40px rgba(0,0,0,0.4)}
  }
  .bell-hint{font-size:0.8rem;color:#718096;text-align:center;line-height:1.5}

  /* Reconnect countdown */
  .reconnect-info{
    font-size:0.78rem;color:#63b3ed;text-align:center;
    background:rgba(99,179,237,0.07);border-radius:10px;
    padding:8px 12px;display:none;
  }
  .reconnect-info.visible{display:block}

  .flash-overlay{
    position:fixed;inset:0;
    background:radial-gradient(circle,rgba(246,173,85,0.35),transparent 70%);
    pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:99;
  }
  .flash-overlay.show{opacity:1}

  .divider{height:1px;background:rgba(255,255,255,0.08)}

  .log{
    background:rgba(0,0,0,0.25);border-radius:12px;padding:12px 14px;
    font-size:0.78rem;min-height:48px;max-height:90px;overflow-y:auto;
    display:flex;flex-direction:column;gap:4px;
  }
  .log-entry{color:#a0aec0}
  .log-entry.recv{color:#f6ad55}
  .log-entry.sys{color:#718096;font-style:italic}

  #notifBanner{
    background:rgba(99,179,237,0.1);border:1px solid rgba(99,179,237,0.25);
    border-radius:12px;padding:10px 14px;
    font-size:0.8rem;color:#90cdf4;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  #notifBanner button{
    background:#3182ce;border:none;color:#fff;
    border-radius:8px;padding:5px 10px;font-size:0.78rem;cursor:pointer;white-space:nowrap;
  }
  #notifBanner.hidden{display:none}
</style>
</head>
<body>

<div class="flash-overlay" id="flashOverlay"></div>
<h1>🔔 Bell Trigger</h1>
<p class="sub">Ring a bell on another device</p>

<div class="card">

  <!-- JOIN SCREEN -->
  <div id="joinScreen">
    <h2>Enter a shared room code<br>
      <small style="color:#718096;font-size:0.8rem">Both devices use the same code</small>
    </h2>
    <div class="saved-pill" id="savedPill" style="display:none">
      <span>Last room: <strong id="savedCodeLabel"></strong></span>
      <button class="clear-btn" onclick="clearSaved()">✕ Clear</button>
    </div>
    <input type="text" id="roomInput" maxlength="12" placeholder="e.g.  MYBELL"
      oninput="this.value=this.value.toUpperCase()"
      onkeydown="if(event.key==='Enter')joinRoom()">
    <button class="join-btn" id="joinBtn" onclick="joinRoom()">Join Room</button>
  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen">
    <div class="room-label">
      Room: <strong id="roomDisplay"></strong>
      <button class="change-room-btn" onclick="changeRoom()">Change</button>
    </div>

    <div id="roleBadge" class="role-badge host">⚓ Host — always listening</div>

    <div id="notifBanner">
      <span>Enable notifications for background alerts</span>
      <button onclick="requestNotifPerm()">Enable</button>
    </div>

    <div id="statusBadge" class="status-badge waiting">
      <div class="dot pulse"></div>
      <span id="statusText">Waiting for other device…</span>
    </div>

    <div class="reconnect-info" id="reconnectInfo"></div>

    <div class="bell-wrap">
      <button class="bell-btn" id="bellBtn" onclick="sendBell()" disabled>🔔</button>
      <div class="bell-hint" id="bellHint">Waiting for other device to connect…</div>
    </div>

    <div class="divider"></div>

    <div class="log" id="log">
      <div class="log-entry sys">Activity will appear here…</div>
    </div>
  </div>

</div>

<script>
// ─── Constants ────────────────────────────────────────────────────
const STORAGE_KEY   = 'bell_trigger_room_code';
const PEER_HOST     = '0.peerjs.com';
const RECONNECT_DELAYS = [2000, 3000, 5000, 8000, 10000]; // escalating retry delays

// ─── State ────────────────────────────────────────────────────────
let peer         = null;
let conn         = null;
let myRoom       = null;
let myRole       = null;   // 'host' | 'guest'
let reconnectTimer   = null;
let reconnectAttempt = 0;
let isChangingRoom   = false;
let heartbeatTimer   = null;

// ─── Audio ────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function unlockAudio(){ if(AC.state === 'suspended') AC.resume(); }

function playBell(volume = 1){
  unlockAudio();
  const osc = AC.createOscillator(), gain = AC.createGain();
  osc.connect(gain); gain.connect(AC.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(900, AC.currentTime);
  osc.frequency.exponentialRampToValueAtTime(450, AC.currentTime + 2);
  gain.gain.setValueAtTime(volume, AC.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 2);
  osc.start(); osc.stop(AC.currentTime + 2);
  [1800, 2700].forEach((f, i) => {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(volume * 0.15, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 1.2 - i * 0.3);
    o.start(); o.stop(AC.currentTime + 1.2 - i * 0.3);
  });
}

// ─── Service Worker & Notifications ──────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
function checkNotifBanner(){
  if(!('Notification' in window) || Notification.permission === 'granted')
    document.getElementById('notifBanner').classList.add('hidden');
}
function requestNotifPerm(){
  Notification.requestPermission().then(p => {
    if(p === 'granted') document.getElementById('notifBanner').classList.add('hidden');
    addLog('Notifications ' + (p === 'granted' ? 'enabled ✓' : 'not enabled'), 'sys');
  });
}
function sendNotification(title, body){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  navigator.serviceWorker.ready.then(reg => {
    reg.showNotification(title, {
      body, vibrate:[200,100,200,100,200],
      tag:'bell-trigger', renotify:true,
      icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔔</text></svg>',
    });
  }).catch(() => { try{ new Notification(title,{body}); }catch(e){} });
}

// ─── Saved room code ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    document.getElementById('savedCodeLabel').textContent = saved;
    document.getElementById('savedPill').style.display = 'flex';
    document.getElementById('roomInput').value = saved;
    document.getElementById('joinBtn').textContent = `Rejoin "${saved}"`;
    setTimeout(() => joinRoom(), 700);
  }
});

function clearSaved(){
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('savedPill').style.display = 'none';
  document.getElementById('roomInput').value = '';
  document.getElementById('joinBtn').textContent = 'Join Room';
}

function changeRoom(){
  isChangingRoom = true;
  stopReconnect();
  if(conn){ try{ conn.close(); }catch(e){} conn = null; }
  if(peer){ try{ peer.destroy(); }catch(e){} peer = null; }
  localStorage.removeItem(STORAGE_KEY);
  isChangingRoom = false;
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('joinScreen').style.display = 'flex';
  document.getElementById('savedPill').style.display = 'none';
  document.getElementById('roomInput').value = '';
  document.getElementById('joinBtn').textContent = 'Join Room';
  document.getElementById('joinBtn').disabled = false;
}

// ─── Join & init ──────────────────────────────────────────────────
function joinRoom(){
  const code = document.getElementById('roomInput').value.trim().toUpperCase();
  if(code.length < 2){ alert('Please enter a room code (at least 2 characters)'); return; }
  document.getElementById('joinBtn').disabled = true;
  document.getElementById('joinBtn').textContent = 'Joining…';
  myRoom = code;
  localStorage.setItem(STORAGE_KEY, code);
  reconnectAttempt = 0;
  tryBecomeHost(code);
}

// ─── Core: try to claim host slot ────────────────────────────────
function tryBecomeHost(roomCode){
  const hostId = 'BELLROOM-HOST-' + roomCode;
  if(peer){ try{ peer.destroy(); }catch(e){} peer = null; }

  peer = new Peer(hostId, peerConfig());

  peer.on('open', id => {
    myRole = 'host';
    reconnectAttempt = 0;
    showMainScreen(roomCode, 'host');
    addLog('You are the Host — listening for connections…', 'sys');
    setStatus('waiting', 'Waiting for other device to join…');
  });

  // Host receives incoming connections
  peer.on('connection', incoming => {
    // Close any existing stale connection
    if(conn){ try{ conn.close(); }catch(e){} }
    conn = incoming;
    setupConn();
  });

  peer.on('error', err => {
    if(err.type === 'unavailable-id'){
      // Host slot taken — become guest instead
      peer.destroy(); peer = null;
      tryBecomeGuest(roomCode);
    } else {
      handlePeerError(err, roomCode);
    }
  });

  peer.on('disconnected', () => {
    if(isChangingRoom) return;
    addLog('Peer server disconnected. Reconnecting…', 'sys');
    // Try to reconnect to peer server (keeps same ID)
    try{ peer.reconnect(); }catch(e){ scheduleReconnect(roomCode); }
  });
}

// ─── Core: become guest and connect to host ───────────────────────
function tryBecomeGuest(roomCode){
  const hostId   = 'BELLROOM-HOST-' + roomCode;
  const guestId  = 'BELLROOM-GUEST-' + roomCode + '-' + Math.random().toString(36).substr(2,5).toUpperCase();
  if(peer){ try{ peer.destroy(); }catch(e){} peer = null; }

  peer = new Peer(guestId, peerConfig());

  peer.on('open', () => {
    myRole = 'guest';
    reconnectAttempt = 0;
    showMainScreen(roomCode, 'guest');
    addLog('Connecting to host…', 'sys');
    setStatus('reconnecting', 'Connecting to host…');
    conn = peer.connect(hostId, { reliable: true });
    setupConn();
  });

  peer.on('error', err => handlePeerError(err, roomCode));

  peer.on('disconnected', () => {
    if(isChangingRoom) return;
    try{ peer.reconnect(); }catch(e){ scheduleReconnect(roomCode); }
  });
}

// ─── Connection setup (shared for host & guest) ───────────────────
function setupConn(){
  clearHeartbeat();

  conn.on('open', () => {
    stopReconnect();
    reconnectAttempt = 0;
    const role = myRole === 'host' ? 'Other device connected!' : 'Connected to host!';
    setStatus('connected', role + ' 🎉');
    document.getElementById('bellBtn').disabled = false;
    document.getElementById('bellHint').textContent = 'Tap to ring the other device';
    addLog('✅ Connected — ready to ring!', 'sys');
    hideReconnectInfo();
    startHeartbeat();
  });

  conn.on('data', data => {
    if(data === 'BELL') receiveBell();
    // heartbeat pings are silently ignored
  });

  conn.on('close', () => {
    if(isChangingRoom) return;
    clearHeartbeat();
    setStatus('disconnected', 'Other device disconnected');
    document.getElementById('bellBtn').disabled = true;
    document.getElementById('bellHint').textContent = 'Waiting to reconnect…';
    addLog('Other device disconnected.', 'sys');
    conn = null;
    // Host just waits — guest tries to reconnect
    if(myRole === 'guest') scheduleReconnect(myRoom);
    else setStatus('waiting', 'Waiting for other device to rejoin…');
  });

  conn.on('error', err => {
    if(isChangingRoom) return;
    clearHeartbeat();
    addLog('Connection error. Retrying…', 'sys');
    conn = null;
    scheduleReconnect(myRoom);
  });
}

// ─── Heartbeat (keeps connection alive) ──────────────────────────
function startHeartbeat(){
  clearHeartbeat();
  heartbeatTimer = setInterval(() => {
    if(conn && conn.open){
      try{ conn.send('ping'); }catch(e){}
    }
  }, 10000); // every 10 seconds
}
function clearHeartbeat(){
  if(heartbeatTimer){ clearInterval(heartbeatTimer); heartbeatTimer = null; }
}

// ─── Auto-reconnect logic ─────────────────────────────────────────
function scheduleReconnect(roomCode){
  if(isChangingRoom) return;
  stopReconnect();
  const delay = RECONNECT_DELAYS[Math.min(reconnectAttempt, RECONNECT_DELAYS.length - 1)];
  reconnectAttempt++;
  let countdown = Math.round(delay / 1000);
  setStatus('reconnecting', `Reconnecting in ${countdown}s… (attempt ${reconnectAttempt})`);
  showReconnectInfo(`Retrying in ${countdown}s…`);

  // Live countdown
  const countTimer = setInterval(() => {
    countdown--;
    if(countdown > 0){
      setStatus('reconnecting', `Reconnecting in ${countdown}s… (attempt ${reconnectAttempt})`);
      showReconnectInfo(`Retrying in ${countdown}s…`);
    } else {
      clearInterval(countTimer);
    }
  }, 1000);

  reconnectTimer = setTimeout(() => {
    clearInterval(countTimer);
    if(isChangingRoom) return;
    addLog(`Reconnect attempt ${reconnectAttempt}…`, 'sys');
    hideReconnectInfo();
    // Always try host first, fall back to guest
    tryBecomeHost(roomCode);
  }, delay);
}

function stopReconnect(){
  if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
}

function handlePeerError(err, roomCode){
  if(isChangingRoom) return;
  addLog('Network error: ' + err.type + '. Retrying…', 'sys');
  scheduleReconnect(roomCode);
}

// ─── Bell send / receive ──────────────────────────────────────────
function sendBell(){
  if(!conn || !conn.open) return;
  conn.send('BELL');
  animateBell();
  addLog('🔔 You rang the bell!', 'send');
}

function receiveBell(){
  playBell();
  animateBell();
  flashScreen();
  if(navigator.vibrate) navigator.vibrate([200, 80, 200, 80, 400]);
  addLog('🔔 Bell received!', 'recv');
  sendNotification('🔔 Bell Trigger', 'Someone rang your bell!');
}

function animateBell(){
  const btn = document.getElementById('bellBtn');
  btn.classList.remove('pulse-ring');
  void btn.offsetWidth;
  btn.classList.add('pulse-ring');
  setTimeout(() => btn.classList.remove('pulse-ring'), 600);
}

function flashScreen(){
  const o = document.getElementById('flashOverlay');
  o.classList.add('show');
  setTimeout(() => o.classList.remove('show'), 250);
}

// ─── UI helpers ───────────────────────────────────────────────────
function showMainScreen(roomCode, role){
  document.getElementById('joinScreen').style.display = 'none';
  const ms = document.getElementById('mainScreen');
  ms.style.display = 'flex';
  document.getElementById('roomDisplay').textContent = roomCode;

  const rb = document.getElementById('roleBadge');
  if(role === 'host'){
    rb.className = 'role-badge host';
    rb.textContent = '⚓ Host — always listening';
  } else {
    rb.className = 'role-badge guest';
    rb.textContent = '📱 Guest — connected to host';
  }

  checkNotifBanner();

  // Ring bell on page load
  setTimeout(() => {
    playBell(0.45);
    animateBell();
    addLog('🔔 Bell rang on page load', 'sys');
  }, 500);
}

function setStatus(type, msg){
  const b = document.getElementById('statusBadge');
  b.className = 'status-badge ' + type;
  let dotClass = 'dot';
  if(type === 'waiting') dotClass += ' pulse';
  if(type === 'reconnecting') dotClass += ' pulse';
  b.innerHTML = `<div class="${dotClass}"></div><span>${msg}</span>`;
}

function showReconnectInfo(msg){
  const el = document.getElementById('reconnectInfo');
  el.textContent = '🔄 ' + msg;
  el.classList.add('visible');
}
function hideReconnectInfo(){
  document.getElementById('reconnectInfo').classList.remove('visible');
}

function addLog(msg, type){
  const log = document.getElementById('log');
  // Remove initial placeholder
  const ph = log.querySelector('.sys');
  if(ph && log.children.length === 1) ph.remove();
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + (type || '');
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  entry.textContent = `[${time}] ${msg}`;
  log.appendChild(entry);
  // Keep max 30 entries
  while(log.children.length > 30) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function peerConfig(){
  return {
    host: PEER_HOST, port: 443, secure: true,
    config: { iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ]}
  };
}

// Unlock audio on first interaction (iOS)
document.addEventListener('touchstart', unlockAudio, { once: true });
document.addEventListener('click', unlockAudio, { once: true });

// Reconnect when tab becomes visible again (e.g. user switches back)
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && myRoom){
    if(!conn || !conn.open){
      if(!reconnectTimer){
        addLog('Tab refocused — checking connection…', 'sys');
        scheduleReconnect(myRoom);
      }
    }
  }
});
</script>
